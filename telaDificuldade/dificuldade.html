<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>60 Segundos no Abrigo - Dificuldade</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="geral.css">
    <link rel="stylesheet" href="dificuldade.css">
</head>
<body>
    <div id="tela-dificuldade" class="tela">
        <div class="container-dificuldade">
            <h2>Escolha a Dificuldade</h2>
            <div class="opcoes-dificuldade">
                <button class="botao-dificuldade" data-difficulty="facil">
                    <img src="https://placehold.co/128x128/4CAF50/FFFFFF?text=Fácil" alt="Fácil">
                    <span>Fácil</span>
                </button>
                <button class="botao-dificuldade" data-difficulty="medio">
                    <img src="https://placehold.co/128x128/FFC107/FFFFFF?text=Médio" alt="Médio">
                    <span>Médio</span>
                </button>
                <button class="botao-dificuldade" data-difficulty="dificil">
                    <img src="https://placehold.co/128x128/F44336/FFFFFF?text=Difícil" alt="Difícil">
                    <span>Difícil</span>
                </button>
            </div>
            <button id="voltar-splash-da-dificuldade">Voltar</button>
        </div>
    </div>
</body>
</html>
